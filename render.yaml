services:
  # Backend API service
  - type: web
    name: pitchiq-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pitchiq-db
          property: connectionString
      - key: HUGGINGFACE_API_KEY
        sync: false

# PostgreSQL Database
databases:
  - name: pitchiq-db
    plan: free
